name: go

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: verify go version
        run: go version

      - name: download modules
        run: go mod download

      - name: verify module state
        run: go mod tidy && git diff --exit-code

      - name: build
        run: go build -v -o jsintel .
